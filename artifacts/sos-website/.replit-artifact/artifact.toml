kind = "web"
previewPath = "/"
title = "Server Owners Support"
version = "1.0.0"
id = "artifacts/sos-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18867

[services.development]
run = "pnpm --filter @workspace/sos-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sos-website", "run", "build" ]
publicDir = "artifacts/sos-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18867"
BASE_PATH = "/"
